name: Refresh MTG Calendar

on:
  schedule:
    - cron: "0 10 * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - name: Fetch events and generate calendar
        run: npm run fetch
        env:
          TOPDECK_API_KEY: ${{ secrets.TOPDECK_API_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh MTG events [skip ci]"
          file_pattern: "output/*.ics data/mtg-cal.db"
        continue-on-error: true
